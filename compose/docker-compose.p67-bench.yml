# ===========================================================================
# BENCH-ONLY: Validate Genesis P67 / vllm#40914 on 2× 3090 (Ampere SM 8.6).
#
# Question: does Sandermage's P67 multi-query Triton kernel give us the
# +128% TPS he measured on 2× A5000, on our 2× 3090 hardware?
#
# Differences vs docker-compose.turbo.yml:
#   - max-model-len=32768 (small for fast bench iteration; not 262K)
#   - P65 OFF (P67 supersedes it — restores FULL_AND_PIECEWISE cudagraph)
#   - P67 ON (the multi-query kernel for K+1 spec-verify)
#   - P78 ON (the .tolist() capture-guard, adapted from our patch)
#   - Genesis tree pinned at v7.48+ (must have P67 — pull master)
#
# Run:
#   cd compose && docker compose -f docker-compose.p67-bench.yml up -d
#   # Wait for "Application startup complete"
#   # Bench with the canonical 800-word essay prompt
#   docker logs -f vllm-qwen36-27b-p67-bench
# ===========================================================================
services:
  vllm-qwen36-27b-p67-bench:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b-p67-bench
    restart: "no"
    ports:
      - "8013:8000"
    volumes:
      - ${MODEL_DIR:-/mnt/models/huggingface}:/root/.cache/huggingface
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # Genesis v7.48+ (must have P67 + P78)
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      # P64/P66/P68/P69 stay ON (orthogonal to P65/P67 trade-off)
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1
      - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
      # Bench knobs:
      # - P65 OFF (so we get FULL cudagraph on spec-decode batches)
      # - P67 ON (multi-query kernel handles K+1 path properly)
      # - P78 ON (capture-guard .tolist() safety-net)
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1
      - GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c", "pip install xxhash pandas scipy -q && python3 -m vllm._genesis.patches.apply_all && exec vllm serve \"$@\"", "--"]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.90"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_k8v4
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
