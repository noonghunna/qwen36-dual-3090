# ===========================================================================
# EXPLORATORY: TP=2 + TurboQuant KV (turboquant_3bit_nc) + MTP n=3 + Genesis v7.14.
#
# Question: with v7.14 P65 (cudagraph downgrade for spec-decode) applied, does
# MTP × TurboQuant work on dual-card TP=2 with vision + tools + 262K?
#
# If yes: this is a strict superset of the fp8 default (more KV pool → either
# more concurrent streams at 262K or more ctx at same concurrency).
#
# Genesis v7.14 also includes:
#   - P4 hybrid turboquant support (replaces standalone PR #39931 patches)
#   - P5 KV page-size unification for hybrid models
#   - P64 streaming MTP tool-call edge case
#   - P66 cudagraph_capture_sizes divisibility filter
# Plus our patch_tolist_cudagraph.py for the .tolist() crash class.
#
# To run: cd compose && docker compose -f docker-compose.turbo.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-dual-turbo:
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen36-27b-dual-turbo
    restart: "no"
    ports:
      - "8011:8000"
    volumes:
      - ${MODEL_DIR:-/mnt/models/huggingface}:/root/.cache/huggingface
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # Genesis v7.14 modular package (includes P4 hybrid TQ + P65 #40880 fix)
      - /opt/ai/vendor/genesis-vllm-patches/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      # Standalone .tolist() during capture fix (separate bug from P65)
      - /opt/ai/vendor/genesis-vllm-patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      # Genesis v7.14 opt-in patches for #40880 fix:
      - GENESIS_ENABLE_P65_TURBOQUANT_SPEC_CG_DOWNGRADE=1
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c", "pip install xxhash pandas scipy -q && python3 -m vllm._genesis.patches.apply_all && python3 /patches/patch_tolist_cudagraph.py && exec vllm serve \"$@\"", "--"]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.85"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_k8v4
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
