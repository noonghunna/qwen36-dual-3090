# ===========================================================================
# DFlash spec-decode on TP=2 — TEXT-ONLY VARIANT (no vision tower).
#
# vs docker-compose.dflash.yml (the with-vision variant): drops MoonViT to
# free ~0.78 GiB per card → bumps max_model_len 185K → 200K (close to the
# absolute DFlash ceiling on dual-3090 with FP16 KV).
#
# Numbers (D5 row in BENCHMARKS.md):
#   77 narr / 124 code TPS, 200K ctx, 1 stream, AL 4.27 warm
#
# To run:
#   cd compose && docker compose -f docker-compose.dflash-noviz.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-dual-dflash:
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen36-27b-dual-dflash-noviz
    restart: "no"
    ports:
      - "8013:8000"
    volumes:
      - ${MODEL_DIR:-/mnt/models/huggingface}:/root/.cache/huggingface
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "200000"
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "8192"
      # No --kv-cache-dtype: DFlash needs head_size=256 + non-causal attention,
      # and no Ampere backend supports that triple with fp8/turbo KV. FP16 default
      # is the only working choice (matches Qwen3.5-27B + DFlash row 4 = 89.7 TPS).
      # --language-model-only frees ~0.78 GiB of MoonViT weights → 15K more KV ctx.
      - --language-model-only
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"dflash","model":"/root/.cache/huggingface/qwen3.6-27b-dflash","num_speculative_tokens":5}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
