# ===========================================================================
# Dual RTX 3090 — Qwen3.6-27B Lorbus int4-AutoRound + MTP + fp8 KV + vision.
#
# What this gives you (vs the single-card project's default):
#   - TP=2 across both 3090s — meaningfully higher TPS, much more headroom
#   - max_num_seqs=2 → 2 concurrent agents at full 262K context (KV pool 168K/2.36×)
#   - max_model_len=262144 → model's natural max, no rope_scaling needed
#   - vision + tools + MTP n=3 + recall — everything on, no compromises
#
# What's intentionally NOT enabled:
#   - TurboQuant KV — sidesteps vllm#40831 entirely. fp8_e5m2 has none of
#     that bug's caveats and is plenty for 64K context across both cards.
#
# Dependencies:
#   - 2× RTX 3090 (Ampere SM 8.6)
#   - vLLM PR #40361 (Marlin pad-sub-tile-n) — patched files volume-mounted
#     from /opt/ai/vllm-src/. PR is open upstream; drop the mount when it
#     lands. See patches/README.md for context.
#
# NVLink-enabled version for 2x RTX 3090 with NVLink bridge
# Based on original docker-compose.yml but with:
#   - NCCL_P2P_DISABLE=0
#   - NCCL_CUMEM_ENABLE=1
#
#   - --disable-custom-all-reduce - Tried removing but got 
#        "Failed: Cuda error /workspace/csrc/custom_all_reduce.cuh:455 'invalid argument'
#
#
# Run:
#   cd compose && docker compose up -d
# ===========================================================================
services:
  vllm-qwen36-27b-dual:
    # Tracking latest nightly intentionally — this stack uses fp8 KV (not
    # TurboQuant), so it doesn't accumulate the same anchor-drift exposure
    # the single-card project does. Pin if you hit a regression; otherwise
    # ride the wave.
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen36-27b-dual
    restart: "no"
    ports:
      - "8010:8000"
    volumes:
      - ../models:/models
      - /root/.cache/huggingface:/root/.cache/huggingface
      # Marlin pad-sub-tile-n patch (vLLM PR #40361) — required for TP=2
      # on AutoRound W4A16 models where out-dim shards fall below 64.
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # start Enable NVLink
      - NCCL_CUMEM_ENABLE=1
      - NCCL_P2P_DISABLE=0
      - NCCL_DEBUG=INFO
      # end NVLink
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
    shm_size: "32gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - /models/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.92"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --kv-cache-dtype
      - fp8
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
