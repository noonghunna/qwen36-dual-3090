# ===========================================================================
# BENCH-ONLY: DFlash N=5 vs MTP n=3 on Genesis v7.48 (P67/P67b/P78 active).
#
# Companion to docker-compose.p67-bench.yml. Same hardware/model/Genesis tree;
# only difference is the speculative method:
#   - p67-bench.yml:        method=mtp, num_speculative_tokens=3
#   - p67-bench-dflash.yml: DFlash draft + speculative_tokens=5 (this file)
#
# Lets us produce a clean head-to-head MTP-vs-DFlash on identical patch state
# for Sandermage's MODELS.md cross-rig data.
# ===========================================================================
services:
  vllm-qwen36-27b-p67-bench-dflash:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b-p67-bench-dflash
    restart: "no"
    ports:
      - "8014:8000"
    volumes:
      - ${MODEL_DIR:-/mnt/models/huggingface}:/root/.cache/huggingface
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - /opt/ai/vllm-src/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1
      - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1
      - GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c", "pip install xxhash pandas scipy -q && python3 -m vllm._genesis.patches.apply_all && exec vllm serve \"$@\"", "--"]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      # DFlash dtype mismatch on Qwen3.6 (PR #40334) — bf16 aligns target + draft
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.90"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      # DFlash on Ampere SM 8.6 requires FP16 KV: only FA2 backend handles
      # non-causal attention at head_size=256, and FA2 rejects any non-FP16 KV
      # cache type. So no kv-cache-dtype here — vLLM defaults to FP16.
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/qwen3.6-27b-dflash","method":"dflash","num_speculative_tokens":5}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
